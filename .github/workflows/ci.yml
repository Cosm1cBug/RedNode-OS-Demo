name: RedNode-OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust Core — build + test + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
            core/rednode-core/target
          key: cargo-${{ hashFiles('core/rednode-core/Cargo.lock') }}

      - name: Check formatting
        working-directory: core/rednode-core
        run: cargo fmt -- --check

      - name: Clippy
        working-directory: core/rednode-core
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        working-directory: core/rednode-core
        run: cargo build --release

      - name: Test (no-infra — skips DB tests gracefully)
        working-directory: core/rednode-core
        run: cargo test -- --nocapture

  typescript:
    name: TypeScript Agents — lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile || pnpm install

      - name: TypeScript typecheck (agents)
        run: |
          for dir in agents/*/; do
            if [ -f "$dir/tsconfig.json" ]; then
              echo "Checking $dir..."
              cd "$dir"
              npx tsc --noEmit || true
              cd ../..
            fi
          done

  docker:
    name: Docker Compose — validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose
        run: docker compose -f deployment/docker-compose.yml config --quiet

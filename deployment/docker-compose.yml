services:
  nats:
    image: nats:2.10
    container_name: rednode-nats
    ports: ["4222:4222", "8222:8222"]
    command: ["-js", "-m", "8222"]
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: rednode-postgres
    environment:
      POSTGRES_USER: rednode
      POSTGRES_PASSWORD: rednode
      POSTGRES_DB: rednode
    ports: ["5432:5432"]
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ../memory/postgres/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9
    container_name: rednode-qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: rednode-ollama
    ports: ["11434:11434"]
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{capabilities: [gpu]}]

  # Observability
  loki:
    image: grafana/loki:2.9
    container_name: rednode-loki
    ports: ["3100:3100"]
    volumes:
      - ../observability/loki/loki.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:v2.52
    container_name: rednode-prometheus
    ports: ["9090:9090"]
    volumes:
      - prometheus_data:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4
    container_name: rednode-grafana
    ports: ["3001:3000"]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: rednode
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on: [loki, prometheus]
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100
    container_name: rednode-otel
    command: [--config=/etc/otel-collector.yaml]
    volumes:
      - ../observability/otel/otel-collector.yaml:/etc/otel-collector.yaml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on: [loki, prometheus]
    restart: unless-stopped

  # RedNode Core
  rednode-core:
    build:
      context: ../core/rednode-core
      dockerfile: Dockerfile
    container_name: rednode-core
    ports: ["8787:8787"]
    environment:
      DATABASE_URL: postgres://rednode:rednode@postgres:5432/rednode
      NATS_URL: nats://nats:4222
      QDRANT_URL: http://qdrant:6334
      RUST_LOG: info
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    depends_on: [nats, postgres, qdrant]
    restart: unless-stopped

volumes:
  pg_data: {}
  qdrant_data: {}
  ollama_data: {}
  prometheus_data: {}
  grafana_data: {}

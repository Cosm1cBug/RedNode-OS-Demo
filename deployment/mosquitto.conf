# RedNode-OS Mosquitto MQTT Broker Configuration
# Used by: Frigate NVR (publishes detection events) + Surveillance Agent (subscribes)

listener 1883
protocol mqtt

# Authentication
allow_anonymous false
password_file /mosquitto/config/passwd

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type information
connection_messages true

# Limits
max_connections 50
message_size_limit 10485760

# ═══════════════════════════════════════════════
# RedNode-OS – Frigate NVR Configuration
# ═══════════════════════════════════════════════
#
# Copy this to your Frigate config volume:
#   cp deployment/frigate.yml /path/to/frigate-config/config.yml
#
# Or mount it in docker-compose.yml:
#   volumes:
#     - ./deployment/frigate.yml:/config/config.yml:ro
#
# BEFORE USING: Replace the following placeholders:
#   - NVR_IP:        Your standalone NVR's IP (e.g., 10.0.30.2)
#   - NVR_USER:      Your NVR username (usually "admin")
#   - NVR_PASSWORD:   Your NVR password
#   - Channel numbers: 01, 02, 03, etc. match your NVR's channel layout
#
# Camera RTSP URLs vary by manufacturer:
#   Reolink NVR:  rtsp://user:pass@IP:554/h264Preview_01_main
#   Hikvision:    rtsp://user:pass@IP:554/Streaming/Channels/101
#   Dahua:        rtsp://user:pass@IP:554/cam/realmonitor?channel=1&subtype=0
#   ONVIF generic: use ONVIF Device Manager to find your RTSP URL

mqtt:
  enabled: true
  host: 127.0.0.1      # Mosquitto running on RedNode server
  port: 1883
  user: frigate
  password: rednode-mqtt
  topic_prefix: frigate

# ─── Detection Engine ───
# Option A: NVIDIA GPU (TensorRT) — best if you have an NVIDIA GPU
# Option B: Coral USB Accelerator — $60, dedicated AI chip
# Option C: CPU — works but slow, only for 1-2 cameras

detectors:
  # Uncomment ONE of these:

  # Option A: NVIDIA GPU
  # tensorrt:
  #   type: tensorrt
  #   device: 0

  # Option B: Coral USB
  # coral:
  #   type: edgetpu
  #   device: usb

  # Option C: CPU (fallback)
  cpu:
    type: cpu
    num_threads: 4

# ─── go2rtc — RTSP Restreaming ───
# Frigate uses go2rtc to pull streams from your NVR and restream them.
# This prevents multiple connections to the NVR (which can crash cheap NVRs).

go2rtc:
  streams:
    # ── Camera 1: Front Door ──
    front_door:
      - "rtsp://NVR_USER:NVR_PASSWORD@NVR_IP:554/h264Preview_01_main"
    front_door_sub:
      - "rtsp://NVR_USER:NVR_PASSWORD@NVR_IP:554/h264Preview_01_sub"

    # ── Camera 2: Driveway ──
    driveway:
      - "rtsp://NVR_USER:NVR_PASSWORD@NVR_IP:554/h264Preview_02_main"
    driveway_sub:
      - "rtsp://NVR_USER:NVR_PASSWORD@NVR_IP:554/h264Preview_02_sub"

    # ── Camera 3: Backyard ──
    backyard:
      - "rtsp://NVR_USER:NVR_PASSWORD@NVR_IP:554/h264Preview_03_main"
    backyard_sub:
      - "rtsp://NVR_USER:NVR_PASSWORD@NVR_IP:554/h264Preview_03_sub"

    # ── Camera 4: Garage (example) ──
    # garage:
    #   - "rtsp://NVR_USER:NVR_PASSWORD@NVR_IP:554/h264Preview_04_main"
    # garage_sub:
    #   - "rtsp://NVR_USER:NVR_PASSWORD@NVR_IP:554/h264Preview_04_sub"

# ─── Cameras ───

cameras:
  front_door:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/front_door
          input_args: preset-rtsp-restream
          roles: [record]
        - path: rtsp://127.0.0.1:8554/front_door_sub
          input_args: preset-rtsp-restream
          roles: [detect]
    detect:
      enabled: true
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - person
        - car
        - dog
        - cat
        - package    # Frigate 0.14+ supports package detection
      filters:
        person:
          min_score: 0.65
          min_area: 1000
          threshold: 0.7
        car:
          min_score: 0.6
          min_area: 2000
    zones:
      porch:
        coordinates: 100,400,500,400,500,700,100,700
        objects:
          - person
          - package
    record:
      enabled: true
      retain:
        days: 7
        mode: motion
      events:
        retain:
          default: 30
          mode: active_objects
    snapshots:
      enabled: true
      retain:
        default: 30
    # Motion masking — mask areas that cause false detections
    # (trees swaying, busy road in background, etc.)
    # Draw masks in the Frigate UI — coordinates auto-generated
    # motion:
    #   mask:
    #     - 0,0,200,0,200,100,0,100

  driveway:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/driveway
          input_args: preset-rtsp-restream
          roles: [record]
        - path: rtsp://127.0.0.1:8554/driveway_sub
          input_args: preset-rtsp-restream
          roles: [detect]
    detect:
      enabled: true
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - person
        - car
        - motorcycle
        - bicycle
    record:
      enabled: true
      retain:
        days: 7
        mode: motion
      events:
        retain:
          default: 30
    snapshots:
      enabled: true

  backyard:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/backyard
          input_args: preset-rtsp-restream
          roles: [record]
        - path: rtsp://127.0.0.1:8554/backyard_sub
          input_args: preset-rtsp-restream
          roles: [detect]
    detect:
      enabled: true
      width: 1280
      height: 720
      fps: 5
    objects:
      track:
        - person
        - dog
        - cat
    record:
      enabled: true
      retain:
        days: 7
        mode: motion
      events:
        retain:
          default: 30
    snapshots:
      enabled: true

# ─── Recording Settings ───

record:
  enabled: true
  retain:
    days: 7
    mode: motion
  events:
    retain:
      default: 30
      mode: active_objects

# ─── Snapshots ───

snapshots:
  enabled: true
  retain:
    default: 30

# ─── Audio Detection (Frigate 0.14+) ───
# Detects: glass breaking, dog barking, smoke alarm, etc.

# audio:
#   enabled: true
#   listen:
#     - bark
#     - glass_breaking
#     - fire_alarm
#     - scream

# ─── UI ───

ui:
  live_mode: mse    # or "webrtc" for lower latency
  timezone: Asia/Kolkata

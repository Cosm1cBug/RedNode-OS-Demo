name: rednode_mobile
description: RedNode-OS Mobile – Privacy-first Autonomous OS Remote
publish_to: 'none'
version: 0.3.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Networking – CNS API
  http: ^1.2.0
  web_socket_channel: ^2.4.0
  
  # Firebase – Push Notifications for approvals
  firebase_core: ^3.1.1
  firebase_messaging: ^14.9.4
  
  # Local notifications – approval push display
  flutter_local_notifications: ^17.1.2
  
  # Biometric authentication – approve High/Critical actions
  local_auth: ^2.2.0
  
  # Secure storage – API tokens, WireGuard keys, node endpoint
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  
  # State
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
